apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: destination
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "sh"
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: "sh123"
        - name: MONGO_INITDB_DATABASE
          value: "sh_db"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: destination
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017