apiVersion: apps/v1
kind: Deployment
metadata:
  name: druid-coordinator
  namespace: destination
spec:
  replicas: 1
  selector:
    matchLabels:
      app: druid-coordinator
  template:
    metadata:
      labels:
        app: druid-coordinator
    spec:
      containers:
      - name: druid-coordinator
        image: apache/druid:28.0.0
        args: ["coordinator"]
        envFrom:
        - configMapRef:
            name: druid-config
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: druid-coordinator
  namespace: destination
spec:
  selector:
    app: druid-coordinator
  ports:
  - port: 8081
    targetPort: 8081
---
